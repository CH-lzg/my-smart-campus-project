<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学生注册 - 校园服务系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1>校园服务系统</h1>
                <p>新生注册入口</p>
            </div>

            <div id="alert-container"></div>

            <form id="register-form">
                <div class="form-group">
                    <label for="username">学号</label>
                    <input type="text" id="username" name="username" placeholder="请输入学号" required>
                </div>

                <div class="form-group">
                    <label for="name">姓名</label>
                    <input type="text" id="name" name="name" placeholder="请输入姓名" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="gender">性别</label>
                        <select id="gender" name="gender" required>
                            <option value="">请选择</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="age">年龄</label>
                        <input type="number" id="age" name="age" placeholder="请输入年龄" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="major">专业</label>
                    <input type="text" id="major" name="major" placeholder="请输入专业" required>
                </div>

                <div class="form-group">
                    <label for="grade">年级</label>
                    <input type="text" id="grade" name="grade" placeholder="如 2024" required>
                </div>

                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email" placeholder="请输入邮箱" required>
                </div>

                <div class="form-group">
                    <label for="phone">手机号</label>
                    <input type="text" id="phone" name="phone" placeholder="请输入手机号" required>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" placeholder="请设置密码" required>
                </div>

                <div class="form-group">
                    <label for="confirm_password">确认密码</label>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="请确认密码" required>
                </div>

                <button type="submit" class="btn btn-primary btn-block">注册</button>
            </form>

            <div style="text-align: center; margin-top: 20px;">
                <p style="color: var(--text-secondary); font-size: 13px;">
                    已有账号？ <a href="/student/login" class="text-link">立即登录</a>
                </p>
                <p style="color: var(--text-secondary); font-size: 13px; margin-top: 8px;">
                    切换入口 <a href="/login" class="text-link">管理员登录</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const name = document.getElementById('name').value;
            const gender = document.getElementById('gender').value;
            const age = document.getElementById('age').value;
            const major = document.getElementById('major').value;
            const grade = document.getElementById('grade').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirm_password = document.getElementById('confirm_password').value;

            if (password !== confirm_password) {
                showAlert('两次输入的密码不一致', 'error');
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username,
                        name,
                        gender,
                        age,
                        major,
                        grade,
                        email,
                        phone,
                        password,
                        role: 'student'
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('注册成功，请登录', 'success');
                    setTimeout(() => {
                        window.location.href = '/student/login';
                    }, 2000);
                } else {
                    showAlert(data.error || '注册失败', 'error');
                }
            } catch (error) {
                showAlert('网络错误，请稍后重试', 'error');
            }
        });

        function showAlert(message, type) {
            const container = document.getElementById('alert-container');
            container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => {
                container.innerHTML = '';
            }, 3000);
        }
    </script>
</body>

</html>
