<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学生登录 - 校园服务系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <h1>校园服务系统</h1>
        <p>学生信息与成绩查询</p>
      </div>

      <div id="alert-container"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">学号</label>
          <input type="text" id="username" name="username" placeholder="请输入学号" required>
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" name="password" placeholder="请输入密码" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">登录</button>
      </form>

      <div style="text-align: center; margin-top: 20px;">
        <p style="color: var(--text-secondary); font-size: 13px;">
          还没有账号？ <a href="/student/register" class="text-link">立即注册</a>
        </p>
        <p style="color: var(--text-secondary); font-size: 13px; margin-top: 8px;">
          切换入口 <a href="/login" class="text-link">管理员登录</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('user', JSON.stringify(data.user));

          if (data.user.role === 'student') {
            window.location.href = '/student/dashboard';
          } else {
            showAlert('学生账号才能从这里登录', 'error');
            localStorage.removeItem('token');
            localStorage.removeItem('user');
          }
        } else {
          showAlert(data.error || '登录失败', 'error');
        }
      } catch (error) {
        showAlert('网络错误，请稍后重试', 'error');
      }
    });

    function showAlert(message, type) {
      const container = document.getElementById('alert-container');
      container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
      setTimeout(() => {
        container.innerHTML = '';
      }, 3000);
    }
  </script>
</body>

</html>
