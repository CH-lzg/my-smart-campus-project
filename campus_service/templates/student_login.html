<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学生登录 - 校园智慧服务与数据分析管理系统</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      padding: 20px;
    }

    .login-box {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    .login-header h1 {
      color: #667eea;
      font-size: 24px;
      margin-bottom: 5px;
    }

    .login-header p {
      color: #666;
      font-size: 14px;
      margin: 0;
    }

    .student-badge {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 12px;
      display: inline-block;
      margin-bottom: 15px;
    }

    .form-group label {
      color: #333;
      font-weight: 500;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      padding: 14px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
    }

    .text-link {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }

    .text-link:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="login-container">
    <div class="login-box">
      <div class="login-header">
        <span class="student-badge">学生端</span>
        <h1>校园智慧服务系统</h1>
        <p>数字化校园管理平台 - 学生入口</p>
      </div>

      <div id="alert-container"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="username">学号</label>
          <input type="text" id="username" name="username" placeholder="请输入学号" required>
        </div>

        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" name="password" placeholder="请输入密码" required>
        </div>

        <button type="submit" class="btn btn-primary btn-block">学生登录</button>
      </form>

      <div style="text-align: center; margin-top: 20px;">
        <p style="color: #666; font-size: 14px;">
          还没有账号？ <a href="/student/register" class="text-link">立即注册</a>
        </p>
        <p style="color: #666; font-size: 14px; margin-top: 10px;">
          切换入口 <a href="/login" class="text-link">管理员登录</a>
        </p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('user', JSON.stringify(data.user));

          if (data.user.role === 'student') {
            window.location.href = '/student/dashboard';
          } else {
            showAlert('学生账号才能从这里登录', 'error');
            localStorage.removeItem('token');
            localStorage.removeItem('user');
          }
        } else {
          showAlert(data.error || '登录失败', 'error');
        }
      } catch (error) {
        showAlert('网络错误，请稍后重试', 'error');
      }
    });

    function showAlert(message, type) {
      const container = document.getElementById('alert-container');
      container.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
      setTimeout(() => {
        container.innerHTML = '';
      }, 3000);
    }
  </script>
</body>

</html>
